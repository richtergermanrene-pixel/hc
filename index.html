<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HC — Sanatorio Norte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #eef2f7; min-height: 100vh; padding: 24px 16px 60px; }
  .header { display: flex; align-items: center; gap: 14px; max-width: 620px; margin: 0 auto 28px; }
  .header-cruz { width: 52px; height: 52px; background: #1a2e4a; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-texto h1 { font-size: 21px; font-weight: 700; color: #1a2e4a; }
  .header-texto p { font-size: 12px; color: #718096; margin-top: 2px; }
  .card { background: white; border-radius: 18px; box-shadow: 0 4px 28px rgba(0,0,0,0.09); padding: 30px 32px; width: 100%; max-width: 620px; margin: 0 auto 16px; }
  .seccion-titulo { font-size: 11px; font-weight: 700; color: #2b6cb0; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 18px; display: flex; align-items: center; gap: 7px; }
  .campo { margin-bottom: 16px; }
  .campo label { display: block; font-size: 11px; font-weight: 600; color: #718096; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .campo input, .campo select, .campo textarea { width: 100%; border: 2px solid #e2e8f0; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; color: #1a202c; background: #f7fafc; transition: all 0.15s; }
  .campo input:focus, .campo select:focus, .campo textarea:focus { outline: none; border-color: #2b6cb0; background: white; box-shadow: 0 0 0 3px rgba(43,108,176,0.1); }
  .campo textarea { resize: vertical; min-height: 85px; line-height: 1.6; }
  .fila2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .dias-header { font-size: 11px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .dias-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 8px; }
  .dia-box { border-radius: 10px; padding: 12px 8px; text-align: center; }
  .dia-box.total { background: #1a2e4a; color: white; }
  .dia-box.sector { background: #ebf8ff; border: 2px solid #bee3f8; }
  .dia-box label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
  .dia-box.total label { color: #90cdf4; }
  .dia-box.sector label { color: #2c5282; }
  .dia-box input { width: 100%; border-radius: 7px; padding: 8px 4px; font-size: 22px; font-weight: 700; text-align: center; font-family: 'Inter', sans-serif; border: none; }
  .dia-box.total input { background: #2c5282; color: white; cursor: default; }
  .dia-box.sector input { background: white; color: #1a2e4a; border: 2px solid #90cdf4; }
  .dia-box.sector input:focus { outline: none; border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,0.15); }
  .dias-aviso { font-size: 12px; font-weight: 500; padding: 8px 12px; border-radius: 8px; margin-top: 6px; display: none; }
  .dias-aviso.ok { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; display: block; }
  .dias-aviso.error { background: #fff5f5; color: #9b2c2c; border: 1px solid #feb2b2; display: block; }
  hr { border: none; border-top: 2px solid #edf2f7; margin: 24px 0; }
  .btn-generar { width: 100%; background: #1a2e4a; color: white; border: none; border-radius: 12px; padding: 17px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s, transform 0.1s; letter-spacing: 0.3px; margin-top: 4px; }
  .btn-generar:hover { background: #2c5282; }
  .btn-generar:active { transform: scale(0.98); }
  .btn-generar:disabled { background: #a0aec0; cursor: not-allowed; }
  .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #fff5f5; border: 2px solid #feb2b2; color: #9b2c2c; border-radius: 10px; padding: 12px 16px; margin-top: 12px; font-size: 13px; display: none; }
  #resultado-wrap { max-width: 800px; margin: 28px auto 0; display: none; }
  .resultado-barra { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 0 4px; }
  .resultado-barra h2 { font-size: 16px; font-weight: 700; color: #1a2e4a; }
  .btns-resultado { display: flex; gap: 10px; }
  .btn-imprimir { background: #276749; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.2s; }
  .btn-imprimir:hover { background: #22543d; }
  .btn-nueva { background: transparent; border: 2px solid #1a2e4a; color: #1a2e4a; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-nueva:hover { background: #ebf4ff; }
  #resultado-doc { background: white; border-radius: 14px; border: 2px solid #e2e8f0; padding: 44px 52px; font-family: Arial, sans-serif; font-size: 13px; line-height: 1.8; color: #1a202c; }
  #resultado-doc .hc-titulo { font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 4px; }
  #resultado-doc .hc-subtitulo { font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #1a2e4a; padding-bottom: 10px; }
  #resultado-doc .hc-seccion { font-weight: bold; font-size: 13px; margin-top: 18px; margin-bottom: 6px; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; }
  #resultado-doc .hc-linea { margin-bottom: 3px; }
  #resultado-doc .hc-parrafo { margin-bottom: 10px; text-align: justify; }
@media print {
    body { background: white; padding: 0; }
    .header, .card, .resultado-barra, .error-msg { display: none !important; }
    #resultado-wrap { display: block !important; margin: 0; max-width: 100%; }
    #resultado-doc { border: none; padding: 20px; border-radius: 0; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-cruz">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <path d="M15 4v22M4 15h22" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="header-texto">
    <h1>Sanatorio Norte S.R.L.</h1>
    <p>Generador de Historia Clínica — Reconquista, Santa Fe</p>
  </div>
</div>

<div class="card">
<div class="seccion-titulo">👤 Datos del Paciente</div>
  <div class="fila2">
    <div class="campo"><label>Apellido y Nombre</label><input type="text" id="nombre" placeholder="García, Juan Carlos"/></div>
    <div class="campo"><label>DNI</label><input type="text" id="dni" placeholder="20.345.678"/></div>
  </div>
  <div class="fila2">
    <div class="campo"><label>Edad</label><input type="text" id="edad" placeholder="65 años"/></div>
    <div class="campo"><label>Sexo</label>
      <select id="sexo">
        <option value="">— Seleccionar —</option>
        <option>Masculino</option>
        <option>Femenino</option>
        <option>Otro</option>
      </select>
    </div>
  </div>
  <div class="fila2">
    <div class="campo"><label>Obra Social</label><input type="text" id="obraSocial" placeholder="PAMI / OSDE / Particular"/></div>
  </div>

  <hr/>
  <div class="seccion-titulo">🏥 Internación</div>
  <div class="fila2">
    <div class="campo"><label>Fecha de Ingreso <span style="color:#e53e3e">*</span></label><input type="date" id="fechaIngreso" onchange="calcularDias()"/></div>
    <div class="campo"><label>Fecha de Egreso <span style="color:#e53e3e">*</span></label><input type="date" id="fechaEgreso" onchange="calcularDias()"/></div>
  </div>

  <div class="dias-header">🛏️ Días de Internación por Sector <span style="color:#e53e3e">*</span></div>
  <div class="dias-grid">
    <div class="dia-box total"><label>Total</label><input type="number" id="diasTotal" readonly value="0"/></div>
    <div class="dia-box sector"><label>🏥 Sala</label><input type="number" id="diasSala" min="0" value="0" onchange="validarDias()"/></div>
    <div class="dia-box sector"><label>❤️ UCO</label><input type="number" id="diasUCO" min="0" value="0" onchange="validarDias()"/></div>
    <div class="dia-box sector"><label>🫁 UTI</label><input type="number" id="diasUTI" min="0" value="0" onchange="validarDias()"/></div>
  </div>
  <div class="dias-aviso" id="diasAviso"></div>

  <div class="campo" style="margin-top:16px;">
    <label>Condición de Egreso</label>
    <select id="condicionEgreso">
      <option value="">— Seleccionar —</option>
      <option>Alta médica</option>
      <option>Alta voluntaria</option>
      <option>Traslado a otro centro</option>
      <option>Fallecido</option>
    </select>
  </div>

  <hr/>
  <div class="seccion-titulo">🩺 Diagnóstico</div>
  <div class="campo">
    <label>Diagnóstico Principal</label>
    <textarea id="diagnostico" placeholder="Ej: Infarto agudo de miocardio anterior&#10;Ej: Neumonía bilateral&#10;Ej: ACV isquémico&#10;&#10;Podés agregar diagnósticos secundarios..."></textarea>
  </div>

  <button class="btn-generar" id="btnGenerar" onclick="generarHC()">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    GENERAR HISTORIA CLÍNICA
  </button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div id="resultado-wrap">
  <div class="resultado-barra">
    <h2>📄 Historia Clínica</h2>
    <div class="btns-resultado">
      <button class="btn-nueva" onclick="nuevaHC()">＋ Nueva HC</button>
      <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir</button>
      <button class="btn-imprimir" style="background:#2b6cb0;" onclick="generarPDF()">📄 Descargar PDF</button>
    </div>
  </div>
  <div id="resultado-doc"></div>
</div>

<script>
function calcularDias() {
  const fi = document.getElementById('fechaIngreso').value;
  const fe = document.getElementById('fechaEgreso').value;
  if (fi && fe) {
    const diff = Math.round((new Date(fe) - new Date(fi)) / 86400000);
    document.getElementById('diasTotal').value = diff > 0 ? diff : 0;
    validarDias();
  }
}

function validarDias() {
  const total = parseInt(document.getElementById('diasTotal').value) || 0;
  const sala  = parseInt(document.getElementById('diasSala').value) || 0;
  const uco   = parseInt(document.getElementById('diasUCO').value) || 0;
  const uti   = parseInt(document.getElementById('diasUTI').value) || 0;
  const suma  = sala + uco + uti;
  const aviso = document.getElementById('diasAviso');
  if (total === 0) { aviso.className = 'dias-aviso'; return; }
  if (suma === total) {
    aviso.className = 'dias-aviso ok';
    aviso.textContent = 'Correcto: Sala ' + sala + ' + UCO ' + uco + ' + UTI ' + uti + ' = ' + total + ' días';
  } else {
    aviso.className = 'dias-aviso error';
    aviso.textContent = 'No coincide: Sala ' + sala + ' + UCO ' + uco + ' + UTI ' + uti + ' = ' + suma + ' días (deben sumar ' + total + ')';
  }
}

function v(id) { return document.getElementById(id)?.value?.trim() || ''; }

function mostrarError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function renderizarHC(texto) {
  const doc = document.getElementById('resultado-doc');
  doc.innerHTML = '';

  const lineas = texto.split('\n');
  let primeraLinea = true;
  let segundaLinea = false;

  for (let i = 0; i < lineas.length; i++) {
    const linea = lineas[i].trim();
    if (!linea) continue;

    // Título principal
    if (primeraLinea && linea.includes('SANATORIO NORTE')) {
      const el = document.createElement('div');
      el.className = 'hc-titulo';
      el.textContent = linea;
      doc.appendChild(el);
      primeraLinea = false;
      segundaLinea = true;
      continue;
    }

    // Subtítulo
    if (segundaLinea) {
      const el = document.createElement('div');
      el.className = 'hc-subtitulo';
      el.textContent = linea;
      doc.appendChild(el);
      segundaLinea = false;
      continue;
    }

    // Detectar títulos de sección (línea en mayúsculas con más de 4 chars)
    const esTitulo = linea === linea.toUpperCase() && linea.length > 4 && !linea.match(/^\d/) && !linea.match(/^[A-Z]{2}:/);
    if (esTitulo) {
      const el = document.createElement('div');
      el.className = 'hc-seccion';
      el.textContent = linea;
      doc.appendChild(el);
      continue;
    }

    // Resto como línea normal
    const el = document.createElement('div');
    el.className = 'hc-linea';
    el.textContent = linea;
    doc.appendChild(el);
  }
}

async function generarHC() {
  
  const diagnostico = v('diagnostico');
  if (!diagnostico) { mostrarError('El diagnóstico es obligatorio.'); return; }

  // Validar campos obligatorios
  if (!v('fechaIngreso')) { mostrarError('La fecha de ingreso es obligatoria.'); return; }
  if (!v('fechaEgreso')) { mostrarError('La fecha de egreso es obligatoria.'); return; }
  const _total = parseInt(document.getElementById('diasTotal').value) || 0;
  const _sala  = parseInt(document.getElementById('diasSala').value) || 0;
  const _uco   = parseInt(document.getElementById('diasUCO').value) || 0;
  const _uti   = parseInt(document.getElementById('diasUTI').value) || 0;
  if (_total === 0) { mostrarError('Ingresá las fechas para calcular los días de internación.'); return; }
  if ((_sala + _uco + _uti) === 0) { mostrarError('Ingresá los días por sector (Sala, UCO, UTI).'); return; }

  const total = parseInt(document.getElementById('diasTotal').value) || 0;
  const sala  = parseInt(document.getElementById('diasSala').value) || 0;
  const uco   = parseInt(document.getElementById('diasUCO').value) || 0;
  const uti   = parseInt(document.getElementById('diasUTI').value) || 0;
  if (total > 0 && (sala + uco + uti) !== total) {
    mostrarError('Los días por sector (' + (sala+uco+uti) + ') no coinciden con el total (' + total + '). Corregí antes de continuar.');
    return;
  }

  const nombre = v('nombre') || 'No informado';
  const dni    = v('dni') || 'No informado';
  const edad   = v('edad') || 'No informada';
  const sexo   = v('sexo') || 'No informado';
  const os     = v('obraSocial') || 'No informada';
  const medico = 'No informado';
  const fi     = v('fechaIngreso') || 'No informada';
  const fe     = v('fechaEgreso') || 'No informada';
  const egreso = v('condicionEgreso') || 'No informada';

  const prompt = `Sos un médico clínico con amplia experiencia en documentación hospitalaria argentina. Generá una Historia Clínica de internación completa y clínicamente coherente.

DATOS:
Nombre: ${nombre} | DNI: ${dni} | Edad: ${edad} | Sexo: ${sexo} | Obra Social: ${os}
Médico Tratante: ${medico} | Ingreso: ${fi} | Egreso: ${fe} | Total: ${total} días
Sala: ${sala} días | UCO: ${uco} días | UTI: ${uti} días | Egreso: ${egreso}
Diagnóstico: ${diagnostico}

FORMATO OBLIGATORIO - MUY IMPORTANTE:
- PROHIBIDO ABSOLUTO: usar #, ##, **, *, ---, guiones como viñetas, ni barras | para tablas
- Solo texto plano limpio, como documento médico impreso en papel
- Títulos de sección en MAYÚSCULAS en su propia línea
- Datos en líneas simples: "Apellido y Nombre: García Juan"
- Laboratorio en líneas simples: "Hemoglobina: 14.2 g/dL" (NO en tabla)

ESTRUCTURA:

SANATORIO NORTE S.R.L.
HISTORIA CLÍNICA DE INTERNACIÓN

DATOS DEL PACIENTE:
Apellido y Nombre: ${nombre}
DNI: ${dni}
Edad: ${edad}
Sexo: ${sexo}
Obra Social: ${os}
Médico Tratante: ${medico}
Fecha de Ingreso: ${fi}
Fecha de Egreso: ${fe}
Días de internación: ${total} (Sala: ${sala} / UCO: ${uco} / UTI: ${uti})
Condición de Egreso: ${egreso}

MOTIVO DE CONSULTA:
(texto narrativo)

ENFERMEDAD ACTUAL:
(texto narrativo)

ANTECEDENTES PERSONALES:
(texto narrativo - sin antecedentes familiares - sin medicación habitual)

EXAMEN FÍSICO DE INGRESO - ${fi}:
Tensión Arterial: ...
Frecuencia Cardíaca: ...
Frecuencia Respiratoria: ...
Temperatura: ...
Saturación O2: ...
(hallazgos relevantes en líneas)

ESTUDIOS COMPLEMENTARIOS:

Laboratorio - ${fi}:
(cada valor en su línea, sin tabla)
Hemoglucotest: X mg/dL

(Imágenes y otros estudios en texto narrativo)

EVOLUCIÓN CLÍNICA:
(Comenzar desde Día 2. NO incluir día de ingreso. Para cada día:)
Día N - fecha - Sector:
(descripción clínica SIN valores de laboratorio, solo conceptos generales)
Tratamiento:
(medicación con dosis y vía, una por línea)

DIAGNÓSTICOS:
Principal: ...
Secundarios: ...

EPICRISIS:
(texto narrativo completo)`;

  const btn = document.getElementById('btnGenerar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generando Historia Clínica...';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const geminiKey = 'AQ.Ab8RN6K4RXFFJbQCuKbr0Vex3dfb5EWIFWmg10-EmQZKTT2L-Q';
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=' + geminiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 4000, temperature: 0.3 }
      })
    });

    const data = await res.json();
    if (data.error) { mostrarError('Error API: ' + data.error.message); return; }

    const texto = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    renderizarHC(texto);
    document.getElementById('resultado-wrap').style.display = 'block';
    document.getElementById('resultado-wrap').scrollIntoView({ behavior: 'smooth' });

  } catch (err) {
    mostrarError('Error de conexión: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> GENERAR HISTORIA CLÍNICA';
  }
}

function generarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  
  const margenIzq = 20;
  const margenDer = 20;
  const anchoUtil = 210 - margenIzq - margenDer;
  let y = 20;
  const lineaAltura = 6;

  function agregarTexto(texto, opciones = {}) {
    const fontSize = opciones.fontSize || 10;
    const bold = opciones.bold || false;
    const center = opciones.center || false;
    
    doc.setFontSize(fontSize);
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    
    const lineas = doc.splitTextToSize(texto, anchoUtil);
    
    if (y + (lineas.length * lineaAltura) > 280) {
      doc.addPage();
      y = 20;
    }
    
    if (center) {
      lineas.forEach(linea => {
        doc.text(linea, 105, y, { align: 'center' });
        y += lineaAltura;
      });
    } else {
      doc.text(lineas, margenIzq, y);
      y += lineas.length * lineaAltura;
    }
  }

  // Obtener contenido del resultado
  const divDoc = document.getElementById('resultado-doc');
  if (!divDoc || divDoc.children.length === 0) {
    alert('Primero generá la Historia Clínica.');
    return;
  }

  const elementos = divDoc.children;
  for (let el of elementos) {
    const texto = el.textContent.trim();
    if (!texto) continue;

    if (el.classList.contains('hc-titulo')) {
      agregarTexto(texto, { fontSize: 14, bold: true, center: true });
      y += 2;
    } else if (el.classList.contains('hc-subtitulo')) {
      agregarTexto(texto, { fontSize: 12, bold: true, center: true });
      y += 4;
      doc.setDrawColor(26, 46, 74);
      doc.setLineWidth(0.5);
      doc.line(margenIzq, y, 210 - margenDer, y);
      y += 4;
    } else if (el.classList.contains('hc-seccion')) {
      y += 3;
      agregarTexto(texto, { fontSize: 11, bold: true });
      doc.setDrawColor(200, 200, 200);
      doc.setLineWidth(0.3);
      doc.line(margenIzq, y, 210 - margenDer, y);
      y += 3;
    } else {
      agregarTexto(texto, { fontSize: 10 });
    }
  }

  doc.save('HistoriaClinica-' + (document.getElementById('nombre')?.value || 'Paciente') + '.pdf');
}

function nuevaHC() {
  ['nombre','dni','edad','obraSocial','medico','fechaIngreso','fechaEgreso','diagnostico'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('sexo').value = '';
  document.getElementById('condicionEgreso').value = '';
  ['diasTotal','diasSala','diasUCO','diasUTI'].forEach(id => document.getElementById(id).value = '0');
  document.getElementById('diasAviso').className = 'dias-aviso';
  document.getElementById('resultado-wrap').style.display = 'none';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
